<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTS LCM · Parts Lifecycle Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1119;
  --bg-1:#141a26;
  --bg-2:#1a2233;
  --bg-3:#212b40;
  --border:#2a3348;
  --border-soft:#232c40;
  --text:#e7ebf3;
  --text-dim:#8b93a8;
  --text-faint:#5c6478;
  --accent:#5b9bd9;
  --accent-soft:rgba(91,155,217,0.14);
  --accent-2:#6fd7c4;
  --accent-2-soft:rgba(111,215,196,0.14);
  --warn:#e2a03f;
  --warn-soft:rgba(226,160,63,0.14);
  --danger:#e2574c;
  --danger-soft:rgba(226,87,76,0.14);
  --good:#4caf82;
  --good-soft:rgba(76,175,130,0.14);
  --sans:'IBM Plex Sans KR',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#2a3348;border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;}
button{font-family:var(--sans);cursor:pointer;}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:232px;flex:none;background:var(--bg-1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--border-soft);}
.brand .mark{display:flex;align-items:center;gap:9px;}
.brand .chip{
  width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#08101c;flex:none;
}
.brand .name{font-weight:700;font-size:14.5px;letter-spacing:0.2px;}
.brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);margin-top:2px;letter-spacing:0.5px;}

.nav{padding:14px 10px;flex:1;}
.nav-group{margin-bottom:6px;}
.nav-group-label{font-size:10.5px;color:var(--text-faint);letter-spacing:1px;padding:10px 10px 6px;font-family:var(--mono);}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text-dim);
  font-size:13px;font-weight:500;cursor:pointer;margin-bottom:2px;transition:background .12s, color .12s;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--bg-2);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);border-color:rgba(91,155,217,0.25);}
.nav-item .ico{width:16px;text-align:center;font-size:13px;flex:none;}
.nav-sub{padding-left:16px;}
.nav-sub .nav-item{font-size:12.3px;padding:7px 12px;}

.sidebar-foot{padding:14px 16px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-faint);line-height:1.6;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;flex:none;border-bottom:1px solid var(--border);background:rgba(13,17,25,0.85);backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:20;
}
.page-title{font-size:15.5px;font-weight:700;letter-spacing:0.2px;}
.page-sub{font-size:11.5px;color:var(--text-faint);font-family:var(--mono);margin-top:1px;}
.topbar-spacer{flex:1;}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;width:280px;
}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12.5px;width:100%;}
.search-box .ico{color:var(--text-faint);font-size:12px;}
.role-select{
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:12.5px;
  font-family:var(--sans);outline:none;
}
.btn{
  background:var(--accent);color:#07101c;border:none;border-radius:8px;padding:9px 15px;font-size:12.8px;font-weight:700;
  display:flex;align-items:center;gap:6px;
}
.btn.ghost{background:var(--bg-2);color:var(--text);border:1px solid var(--border);font-weight:600;}
.btn.small{padding:6px 11px;font-size:11.8px;}
.btn.danger{background:var(--danger);color:#160504;}

.content{padding:22px 26px 60px;}
.view{display:none;}
.view.active{display:block;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ---------- Common widgets ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px;position:relative;overflow:hidden;}
.kpi-card .label{font-size:11.5px;color:var(--text-faint);font-family:var(--mono);letter-spacing:0.4px;text-transform:uppercase;}
.kpi-card .value{font-size:26px;font-weight:700;margin-top:8px;font-family:var(--mono);}
.kpi-card .delta{font-size:11.5px;margin-top:6px;color:var(--text-dim);}
.kpi-card .delta.up{color:var(--good);}
.kpi-card .delta.down{color:var(--danger);}
.kpi-card .bar-accent{position:absolute;left:0;top:0;bottom:0;width:3px;}

.grid{display:grid;gap:16px;}
.grid.cols-2{grid-template-columns:1fr 1fr;}
.grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:1100px){.grid.cols-2,.grid.cols-3{grid-template-columns:1fr;}}

.panel{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:18px 19px;}
.panel-head{display:flex;align-items:center;margin-bottom:14px;gap:10px;}
.panel-title{font-size:13.5px;font-weight:700;}
.panel-title .tag{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);font-weight:400;margin-left:8px;}
.panel-head .spacer{flex:1;}

table{width:100%;border-collapse:collapse;font-size:12.6px;}
th{
  text-align:left;color:var(--text-faint);font-weight:600;font-size:10.8px;letter-spacing:0.4px;text-transform:uppercase;
  padding:8px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);white-space:nowrap;
}
td{padding:9px 10px;border-bottom:1px solid var(--border-soft);color:var(--text);white-space:nowrap;}
tbody tr:hover{background:var(--bg-2);}
.table-scroll{overflow-x:auto;}
.mono{font-family:var(--mono);}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:600;font-family:var(--mono);}
.badge.normal{background:var(--good-soft);color:var(--good);}
.badge.cd{background:var(--warn-soft);color:var(--warn);}
.badge.defect{background:var(--danger-soft);color:var(--danger);}
.badge.npw{background:rgba(160,120,230,.16);color:#b79bee;}
.badge.pm{background:var(--accent-soft);color:var(--accent);}
.badge.bm{background:var(--danger-soft);color:var(--danger);}
.badge.full{background:var(--good-soft);color:var(--good);}
.badge.mid{background:var(--warn-soft);color:var(--warn);}
.badge.neutral{background:var(--bg-3);color:var(--text-dim);}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}
.dot.normal{background:var(--good);} .dot.cd{background:var(--warn);} .dot.defect{background:var(--danger);} .dot.npw{background:#b79bee;}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.filters select,.filters input{
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 10px;font-size:12px;
  font-family:var(--sans);outline:none;
}
.filters .clear{color:var(--text-faint);font-size:11.5px;padding:7px 6px;text-decoration:underline;cursor:pointer;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{
  padding:10px 14px;font-size:12.6px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.chart-wrap{position:relative;height:270px;}
.chart-wrap.short{height:200px;}

/* lifecycle timeline */
.timeline{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 0 14px;}
.tl-step{
  flex:none;min-width:96px;padding:10px 14px 10px 20px;position:relative;background:var(--bg-2);margin-right:4px;border-radius:6px;
  cursor:pointer;border:1px solid var(--border-soft);transition:transform .1s;
}
.tl-step:hover{transform:translateY(-2px);}
.tl-step.sel{outline:2px solid var(--accent);}
.tl-step:after{
  content:"";position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:0;height:0;
  border-top:19px solid transparent;border-bottom:19px solid transparent;border-left:9px solid var(--bg-2);z-index:2;
}
.tl-step:last-child:after{display:none;}
.tl-step .cyc{font-family:var(--mono);font-size:10px;color:var(--text-faint);}
.tl-step .st{font-size:12px;font-weight:700;margin-top:3px;}
.tl-step .dt{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:2px;}
.tl-step.normal{border-left:3px solid var(--good);}
.tl-step.cd{border-left:3px solid var(--warn);}
.tl-step.defect{border-left:3px solid var(--danger);}
.tl-step.npw{border-left:3px solid #b79bee;}

.heat-grid{display:grid;gap:3px;}
.heat-cell{
  padding:9px 4px;text-align:center;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:600;color:#08101c;
}
.heat-row-label{font-size:11px;color:var(--text-dim);display:flex;align-items:center;padding-right:6px;font-family:var(--mono);}
.heat-col-label{font-size:10px;color:var(--text-faint);text-align:center;font-family:var(--mono);padding-bottom:4px;}

.insight-card{
  display:flex;gap:12px;padding:13px 14px;border-radius:9px;background:var(--bg-2);border:1px solid var(--border-soft);margin-bottom:10px;
}
.insight-card .ic-icon{
  width:34px;height:34px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;
}
.insight-card .ic-body .ic-title{font-weight:700;font-size:13px;margin-bottom:3px;}
.insight-card .ic-body .ic-desc{font-size:12.3px;color:var(--text-dim);line-height:1.55;}
.insight-card.info .ic-icon{background:var(--accent-soft);color:var(--accent);}
.insight-card.warn .ic-icon{background:var(--warn-soft);color:var(--warn);}
.insight-card.danger .ic-icon{background:var(--danger-soft);color:var(--danger);}
.insight-card.good .ic-icon{background:var(--good-soft);color:var(--good);}

.empty-state{padding:60px 20px;text-align:center;color:var(--text-faint);}
.empty-state .big{font-size:32px;margin-bottom:10px;}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.compare-card{border-radius:9px;padding:14px;border:1px solid var(--border-soft);}
.compare-card.best{background:var(--good-soft);border-color:rgba(76,175,130,.3);}
.compare-card.worst{background:var(--danger-soft);border-color:rgba(226,87,76,.3);}
.compare-card .cc-label{font-family:var(--mono);font-size:10.5px;letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase;}
.compare-card.best .cc-label{color:var(--good);}
.compare-card.worst .cc-label{color:var(--danger);}
.compare-card .cc-row{display:flex;justify-content:space-between;font-size:12.3px;padding:4px 0;color:var(--text-dim);}
.compare-card .cc-row b{color:var(--text);font-weight:600;}

.stat-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg-2);border:1px solid var(--border-soft);border-radius:8px;padding:12px 13px;}
.stat-box .sv{font-family:var(--mono);font-size:19px;font-weight:700;}
.stat-box .sl{font-size:10.8px;color:var(--text-faint);margin-top:3px;}

.roadmap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
.roadmap-card{background:var(--bg-2);border:1px solid var(--border-soft);border-radius:9px;padding:15px;}
.roadmap-card .rc-status{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:100px;display:inline-block;margin-bottom:9px;}
.roadmap-card h4{margin:0 0 6px;font-size:13.5px;}
.roadmap-card p{margin:0;font-size:12px;color:var(--text-dim);line-height:1.6;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(6,8,14,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg-1);border:1px solid var(--border);border-radius:12px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;
  padding:22px 24px;
}
.modal h3{margin:0 0 4px;font-size:16px;}
.modal .msub{font-size:11.5px;color:var(--text-faint);font-family:var(--mono);margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;color:var(--text-faint);font-family:var(--mono);}
.form-field select,.form-field input,.form-field textarea{
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 10px;font-size:12.6px;
  font-family:var(--sans);outline:none;
}
.form-field textarea{resize:vertical;min-height:56px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.role-note{
  display:flex;gap:9px;align-items:flex-start;background:var(--accent-soft);border:1px solid rgba(91,155,217,.25);color:var(--accent);
  padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:16px;
}
.section-note{color:var(--text-faint);font-size:12px;margin:-6px 0 16px;line-height:1.6;}
.small-text{font-size:11.3px;color:var(--text-faint);}
.hidden{display:none !important;}
.pill-toggle{display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:3px;}
.pill-toggle button{background:none;border:none;color:var(--text-dim);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;}
.pill-toggle button.active{background:var(--accent);color:#07101c;}
.sn-link{color:var(--accent);cursor:pointer;font-family:var(--mono);font-weight:600;}
.sn-link:hover{text-decoration:underline;}

/* ---- Operation live board additions ---- */
.live-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--good);letter-spacing:.5px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 rgba(76,175,130,.6);animation:pulse 1.6s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,175,130,.55);}70%{box-shadow:0 0 0 7px rgba(76,175,130,0);}100%{box-shadow:0 0 0 0 rgba(76,175,130,0);}}

.minibar-list{display:flex;flex-direction:column;gap:10px;}
.minibar-row{display:grid;grid-template-columns:74px 1fr 34px;align-items:center;gap:9px;}
.minibar-row .mb-label{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.minibar-row .mb-track{background:var(--bg-2);border-radius:5px;height:10px;overflow:hidden;}
.minibar-row .mb-fill{height:100%;border-radius:5px;}
.minibar-row .mb-val{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);text-align:right;}

.stage-flow{display:flex;gap:6px;flex-wrap:wrap;}
.stage-chip{flex:1;min-width:110px;background:var(--bg-2);border:1px solid var(--border-soft);border-radius:8px;padding:11px 12px;}
.stage-chip .sc-n{font-family:var(--mono);font-size:20px;font-weight:700;}
.stage-chip .sc-l{font-size:10.8px;color:var(--text-faint);margin-top:3px;}
.stage-chip.alert{border-color:rgba(226,87,76,.4);background:var(--danger-soft);}
.stage-chip.alert .sc-n{color:var(--danger);}

.factory-board{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.factory-board .fb-head{padding:12px 15px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px;background:var(--bg-2);}
.factory-board .fb-head b{font-size:13px;}
.station-row{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border-soft);font-size:12.6px;}
.station-row:last-child{border-bottom:none;}
.station-row .st-name{display:flex;align-items:center;gap:9px;}
.station-status{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;}
.station-status .sdot{width:7px;height:7px;border-radius:50%;}
.station-status.running{background:var(--good-soft);color:var(--good);}
.station-status.running .sdot{background:var(--good);animation:pulse 1.6s infinite;}
.station-status.idle{background:var(--bg-3);color:var(--text-faint);}
.station-status.idle .sdot{background:var(--text-faint);}
.station-status.waiting{background:var(--warn-soft);color:var(--warn);}
.station-status.waiting .sdot{background:var(--warn);}
</style>
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <div class="sidebar">
    <div class="brand">
      <div class="mark">
        <div class="chip">PL</div>
        <div>
          <div class="name">PARTS LCM</div>
          <div class="sub">LIFECYCLE INTELLIGENCE</div>
        </div>
      </div>
    </div>
    <div class="nav" id="navContainer"></div>
    <div class="sidebar-foot">v0.1 · 세정공정 파츠 이력관리<br>샘플 데이터 기반 데모</div>
  </div>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="pageTitle">Executive Dashboard</div>
        <div class="page-sub" id="pageSub">EXECUTIVE · OVERVIEW</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="search-box">
        <span class="ico">S/N</span>
        <input id="globalSearch" list="snList" placeholder="시리얼 번호로 이력 검색..." />
        <datalist id="snList"></datalist>
      </div>
      <select class="role-select" id="roleSelect">
        <option value="admin">관리자</option>
        <option value="inspector">검사자</option>
        <option value="operator">작업자</option>
        <option value="customer">고객사 조회</option>
      </select>
      <button class="btn" id="newRecordBtn">+ 신규 등록</button>
    </div>

    <div class="content" id="content"><!-- views injected by JS --></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* =====================================================================
   PARTS LCM — sample-data engine + rendering
   ===================================================================== */
(function(){
"use strict";

/* ---------------------- 1. MASTER DATA ---------------------- */
const CUSTOMERS = ['고객사 A','고객사 B','고객사 C','고객사 D','고객사 E'];
const MAKERS = ['AMAT','LAM','TEL','ASM'];
const PROCESSES = ['ETCH','CVD','PVD','CMP'];
const GAS_BY_PROCESS = {
  ETCH:['POLY','OXIDE','METAL'],
  CVD:['OXIDE','NITRIDE'],
  PVD:['METAL','BARRIER'],
  CMP:['OXIDE','METAL']
};
const PART_KITS = [
  {name:'Focus Ring', coated:true, baseLife:520},
  {name:'Edge Ring', coated:true, baseLife:430},
  {name:'Upper Electrode', coated:true, baseLife:610},
  {name:'Shower Head', coated:true, baseLife:580},
  {name:'Liner', coated:false, baseLife:700},
  {name:'Chamber Liner', coated:false, baseLife:650},
  {name:'Baffle Plate', coated:false, baseLife:480},
  {name:'Gas Distribution Plate', coated:true, baseLife:540}
];
const FACTORIES = ['1공장','2공장'];
const CLEAN_EQUIP = ['CE-01','CE-02','CE-03','CE-04','CE-05'];
const OPERATORS = ['김민수','이정훈','박서준','최유리','정다은'];
const INSPECTORS_IN = ['오지훈','한소희','서지민'];
const INSPECTORS_OUT = ['장동혁','윤아름','신하늘'];
const ISSUE_TYPES = ['정상','CD불량','DEFECT','NPW문제'];
const PM_TYPES = ['정기PM','BM'];
const CYCLE_TYPES = ['정상사이클','중간이탈'];
const ACTIONS_BY_ISSUE = {
  '정상': ['이상 없음 - 표준 세정 절차 완료','기준치 이내 확인 후 정상 출하'],
  'CD불량': ['CD 재측정 후 리코팅 진행','코팅 두께 보정 후 재검사'],
  'DEFECT': ['Particle 재세정 (2차 클리닝) 실시','초음파 세정 추가 후 재검사'],
  'NPW문제': ['NPW 테스트 챔버 재투입 조치','표면 프로파일 재작업 후 재출하']
};

function rand(min,max){ return Math.random()*(max-min)+min; }
function randInt(min,max){ return Math.floor(rand(min,max+1)); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function seededDateAdd(date, days){ const d = new Date(date); d.setDate(d.getDate()+Math.round(days)); return d; }
function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function monthKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

/* weighted issue picker - injects realistic "bad actor" patterns for analytics */
function pickIssue(equip, operator, maker, process, gas){
  let w = {'정상':62, 'CD불량':12, 'DEFECT':13, 'NPW문제':13};
  if (equip === 'CE-03') w['DEFECT'] += 22;
  if (operator === '박서준') w['CD불량'] += 18;
  if (maker === 'TEL' && process === 'ETCH' && gas === 'METAL') w['NPW문제'] += 20;
  if (process === 'CMP') w['CD불량'] += 8;
  w['정상'] = Math.max(20, w['정상'] - (w['CD불량']+w['DEFECT']+w['NPW문제'] - 38));
  const total = w['정상']+w['CD불량']+w['DEFECT']+w['NPW문제'];
  let r = Math.random()*total;
  for (const k of ISSUE_TYPES){ if (r < w[k]) return k; r -= w[k]; }
  return '정상';
}

/* ---------------------- 2. DATA GENERATION ---------------------- */
let SERIALS = [];   // one per physical part
let ALL_CYCLES = []; // flattened cycle history across all serials

function generateData(){
  SERIALS = [];
  ALL_CYCLES = [];
  const today = new Date();
  const totalSerials = 46;

  for (let i=0;i<totalSerials;i++){
    const kit = pick(PART_KITS);
    const customer = pick(CUSTOMERS);
    const maker = pick(MAKERS);
    const process = pick(PROCESSES);
    const gas = pick(GAS_BY_PROCESS[process]);
    const toolId = `${maker}-${process}-${randInt(1,6)}`;
    const chamber = `CH${randInt(1,4)}`;
    const sn = `${kit.name.slice(0,2).toUpperCase()}${maker.slice(0,1)}${String(1000+i).slice(-4)}-${randInt(100,999)}`;

    const cycleCount = randInt(3,10);
    const startDaysAgo = randInt(180, 900);
    let cursor = seededDateAdd(today, -startDaysAgo);
    let cyclesSinceRecoat = 0;

    const serial = {
      sn, kit: kit.name, coatedKit: kit.coated, baseLife: kit.baseLife,
      customer, maker, process, gas, toolId, chamber,
      retired: false, retiredReason:null,
      cycles: []
    };

    for (let c=1;c<=cycleCount;c++){
      const factory = pick(FACTORIES);
      const equip = pick(CLEAN_EQUIP);
      const operator = pick(OPERATORS);
      const inspectorIn = pick(INSPECTORS_IN);
      const inspectorOut = pick(INSPECTORS_OUT);
      const pmType = Math.random() < 0.76 ? '정기PM' : 'BM';
      const cycleType = Math.random() < 0.85 ? '정상사이클' : '중간이탈';
      const issue = pickIssue(equip, operator, maker, process, gas);
      cyclesSinceRecoat++;
      const recoating = kit.coated && (cyclesSinceRecoat >= 3 && Math.random() < 0.55);
      if (recoating) cyclesSinceRecoat = 0;
      const coated = kit.coated;

      const inDate = new Date(cursor);
      const processDays = randInt(2,6) + (recoating?randInt(1,2):0);
      const outDate = seededDateAdd(inDate, processDays);

      const targetLife = kit.baseLife * (recoating?1.05:1.0) * rand(0.9,1.1);
      const usageHours = cycleType === '정상사이클'
        ? Math.round(targetLife * rand(0.85,1.05))
        : Math.round(targetLife * rand(0.25,0.65));

      const action = pick(ACTIONS_BY_ISSUE[issue]);

      const cycle = {
        sn, cycleNo:c,
        customer, maker, process, gas, toolId, chamber, kit: kit.name,
        inDate: fmtDate(inDate), outDate: fmtDate(outDate),
        inDateObj:inDate, outDateObj:outDate,
        factory, equip, operator, inspectorIn, inspectorOut,
        pmType, issue, coated, recoating, cycleType, usageHours, action,
        isLast: c===cycleCount
      };
      serial.cycles.push(cycle);
      ALL_CYCLES.push(cycle);

      const gap = randInt(3,25);
      cursor = seededDateAdd(outDate, gap);
    }

    // retirement chance for older / heavily used serials
    const lastCycle = serial.cycles[serial.cycles.length-1];
    const totalUsage = serial.cycles.reduce((s,c)=>s+c.usageHours,0);
    if (totalUsage > kit.baseLife * cycleCount * 0.95 && Math.random() < 0.45){
      serial.retired = true;
      serial.retiredReason = Math.random()<0.5 ? '누적 사용시간 한계 도달' : '반복 DEFECT 발생으로 Scrap 처리';
    }
    SERIALS.push(serial);
  }
  ALL_CYCLES.sort((a,b)=> a.inDateObj - b.inDateObj);
}
generateData();

/* ---------------------- 3. AGGREGATION HELPERS ---------------------- */
function groupBy(arr, keyFn){
  const m = {};
  arr.forEach(item=>{
    const k = keyFn(item);
    (m[k] = m[k]||[]).push(item);
  });
  return m;
}
function defectRate(cycles){
  if (!cycles.length) return 0;
  const bad = cycles.filter(c=>c.issue!=='정상').length;
  return bad/cycles.length;
}
function pct(n){ return (n*100).toFixed(1)+'%'; }

function serialStats(serial){
  const cycles = serial.cycles;
  const total = cycles.length;
  const recoatCount = cycles.filter(c=>c.recoating).length;
  const fullTime = cycles.filter(c=>c.cycleType==='정상사이클').length;
  const midPull = total - fullTime;
  const avgUsage = Math.round(cycles.reduce((s,c)=>s+c.usageHours,0)/total);
  const dRate = defectRate(cycles);
  const sorted = [...cycles].sort((a,b)=>b.usageHours-a.usageHours);
  const best = sorted.find(c=>c.issue==='정상') || sorted[0];
  const worstCandidates = cycles.filter(c=>c.issue!=='정상').sort((a,b)=>a.usageHours-b.usageHours);
  const worst = worstCandidates[0] || sorted[sorted.length-1];
  return {total, recoatCount, fullTime, midPull, avgUsage, dRate, best, worst};
}

/* cohort = all serials sharing same kit, used for AI life prediction & golden parts */
function cohortFor(kitName){ return SERIALS.filter(s=>s.kit===kitName); }
function cohortAvgMaxCycles(kitName){
  const cohort = cohortFor(kitName);
  if (!cohort.length) return 6;
  return cohort.reduce((s,c)=>s+c.cycles.length,0)/cohort.length;
}

/* -------- AI heuristic engine (rule-based, explainable — not a trained model) -------- */
function aiRemainingLife(serial){
  const cohortAvg = cohortAvgMaxCycles(serial.kit);
  const used = serial.cycles.length;
  const remainCycles = Math.max(0, Math.round(cohortAvg - used));
  const stats = serialStats(serial);
  const remainHours = Math.max(0, Math.round((cohortAvg-used) * stats.avgUsage));
  return {remainCycles, remainHours, cohortAvg: cohortAvg.toFixed(1)};
}
function aiRecoatingRecommendation(serial){
  const kitInfo = PART_KITS.find(k=>k.name===serial.kit);
  if (!kitInfo.coated) return {need:false, reason:'비코팅 파츠 (Bare Metal) — Recoating 대상 아님'};
  let sinceRecoat = 0;
  for (let i=serial.cycles.length-1;i>=0;i--){
    if (serial.cycles[i].recoating) break;
    sinceRecoat++;
  }
  const need = sinceRecoat >= 3;
  return {need, sinceRecoat, reason: need
    ? `최근 리코팅 이후 ${sinceRecoat}회 연속 세정 진행 — 코팅층 마모 예상, Recoating 권장`
    : `최근 리코팅 이후 ${sinceRecoat}회 세정 — 아직 여유 있음`};
}
function aiScrapRecommendation(serial){
  const stats = serialStats(serial);
  const cohortAvg = cohortAvgMaxCycles(serial.kit);
  const overLife = serial.cycles.length >= cohortAvg*1.05;
  const highDefect = stats.dRate > 0.4;
  const need = overLife || highDefect || serial.retired;
  let reason = [];
  if (serial.retired) reason.push(`이미 Scrap 처리됨 (${serial.retiredReason})`);
  if (overLife) reason.push(`동일 파츠군 평균 사용주기(${cohortAvg.toFixed(1)}회) 대비 초과 사용 중`);
  if (highDefect) reason.push(`불량률 ${pct(stats.dRate)}로 평균 대비 높음`);
  if (!reason.length) reason.push('현재 안정적인 사용 구간 — Scrap 불필요');
  return {need, reason: reason.join(' / ')};
}
function aiAbnormalPatterns(){
  const overallRate = defectRate(ALL_CYCLES);
  const groups = [
    {label:'세정장비', keyFn:c=>c.equip},
    {label:'세정담당자', keyFn:c=>c.operator},
    {label:'장비사+공정', keyFn:c=>c.maker+' / '+c.process}
  ];
  const flags = [];
  groups.forEach(g=>{
    const gb = groupBy(ALL_CYCLES, g.keyFn);
    Object.entries(gb).forEach(([k, cycles])=>{
      if (cycles.length < 5) return;
      const r = defectRate(cycles);
      if (r > overallRate*1.4){
        flags.push({group:g.label, key:k, rate:r, n:cycles.length, baseline:overallRate});
      }
    });
  });
  return flags.sort((a,b)=>b.rate-a.rate);
}
function aiGoldenParts(kitName){
  const cohort = cohortFor(kitName);
  if (!cohort.length) return null;
  let best = null, bestScore = -Infinity;
  cohort.forEach(s=>{
    const st = serialStats(s);
    const score = st.avgUsage * (1 - st.dRate) * Math.log(st.total+1);
    if (score > bestScore){ bestScore = score; best = s; }
  });
  return best;
}

function scopedCycles(){
  const cf = visibleCustomerFilter();
  return cf ? ALL_CYCLES.filter(c=>c.customer===cf) : ALL_CYCLES;
}
function scopedSerials(){
  const cf = visibleCustomerFilter();
  return cf ? SERIALS.filter(s=>s.customer===cf) : SERIALS;
}

  const el = document.getElementById('navContainer');

  const allowed = NAV.flatMap(g=>g.items).find(it=>it.id===viewId);

  if (typeof opsRefreshTimer !== 'undefined' && opsRefreshTimer && viewId !== 'ops-dashboard'){
    clearInterval(opsRefreshTimer); opsRefreshTimer = null;

  document.getElementById('pageTitle').textContent = PAGE_META[viewId][0];
  document.getElementById('pageSub').textContent = PAGE_META[viewId][1];
  renderNav();
  renderView(viewId);

function issueBadge(issue){
  const cls = {'정상':'normal','CD불량':'cd','DEFECT':'defect','NPW문제':'npw'}[issue] || 'neutral';
  return `<span class="badge ${cls}"><span class="dot ${cls}"></span>${issue}</span>`;
}
function pmBadge(pm){ return `<span class="badge ${pm==='정기PM'?'pm':'bm'}">${pm}</span>`; }
function cycleTypeBadge(ct){ return `<span class="badge ${ct==='정상사이클'?'full':'mid'}">${ct}</span>`; }
function fmtNum(n){ return n.toLocaleString('ko-KR'); }

function thisMonthCycles(cycles){
  const now = new Date();
  const key = monthKey(now);
  return cycles.filter(c=>monthKey(c.outDateObj)===key);
}
function lastMonthCycles(cycles){
  const d = new Date(); d.setMonth(d.getMonth()-1);
  const key = monthKey(d);
  return cycles.filter(c=>monthKey(c.outDateObj)===key);
}

/* -- Live pipeline snapshot: simulated "현재 공정 중" 재공 파츠 목록 (실제 S/N 풀에서 추출) -- */
let LIVE_PIPELINE = [];
function generateLivePipeline(){
  const stages = ['입고','세정중','Bake중','Coating중','배송중'];
  const n = randInt(70,95);
  const items = [];
  for (let i=0;i<n;i++){
    const s = pick(SERIALS);
    const isDelayed = Math.random() < 0.06;
    items.push({
      sn:s.sn, customer:s.customer, maker:s.maker, process:s.process,
      stage: isDelayed ? '지연중' : pick(stages),
      delayed:isDelayed, bm: Math.random() < 0.14,
      daysInStage: randInt(1,9)
    });
  }
  return items;
}
LIVE_PIPELINE = generateLivePipeline();

/* -- Factory floor stations -- */

  '1공장':[ {name:'Cleaning #1',type:'clean'}, {name:'Cleaning #2',type:'clean'}, {name:'Bake #1',type:'bake'}, {name:'Bake #2',type:'bake'}, {name:'Coating',type:'coat'} ],
  '2공장':[ {name:'Cleaning #3',type:'clean'}, {name:'Cleaning #4',type:'clean'}, {name:'Bake #3',type:'bake'}, {name:'Inspection',type:'inspect'} ]
};
let STATION_STATE = {};
function randomStationStatus(){
  const r = Math.random();
  if (r < 0.55) return 'running';
  if (r < 0.8) return 'idle';
  return 'waiting';
}
function refreshStationState(){
  Object.values(STATIONS_BY_FACTORY).flat().forEach(st=>{ STATION_STATE[st.name] = randomStationStatus(); });
}
refreshStationState();
const STATION_LABEL = {running:'Running', idle:'Idle', waiting:'Waiting'};

function stationRowsHtml(factoryName){
  return STATIONS_BY_FACTORY[factoryName].map(st=>{
    const status = STATION_STATE[st.name] || 'idle';
    return `<div class="station-row">
      <div class="st-name">${st.name}</div>
      <div class="station-status ${status}"><span class="sdot"></span>${STATION_LABEL[status]}</div>
    </div>`;
  }).join('');
}
function renderFactoryBoards(){
  Object.keys(STATIONS_BY_FACTORY).forEach((f,idx)=>{

  const max = Math.max(1, ...entries.map(([,v])=>v.length));
  return `<div class="minibar-list">${entries.map(([k,v])=>`
    <div class="minibar-row">

function exportCyclesToCSV(cycles, filename){
  const headers = ['S/N','고객사','공정','가스/막질','호기','챔버','장비사','PARTS KIT','반입일','반출일','공장','세정장비','담당자','입고검사','출고검사','PM유형','사이클구분','코팅','Recoating','이슈','사용시간(h)','조치내용'];
  const rows = cycles.map(c=>[c.sn,c.customer,c.process,c.gas,c.toolId,c.chamber,c.maker,c.kit,c.inDate,c.outDate,c.factory,c.equip,c.operator,c.inspectorIn,c.inspectorOut,c.pmType,c.cycleType,c.coated?'Y':'N',c.recoating?'Y':'N',c.issue,c.usageHours,c.action]);
  const csv = [headers, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function barChartConfig(labels, data, label, color, horizontal){
  return {
    type:'bar',
    data:{labels, datasets:[{label, data, backgroundColor:color, borderRadius:5}]},
    options:{
      indexAxis: horizontal?'y':'x',
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales: horizontal
        ? { x:{grid:{color:GRID_COLOR},ticks:{font:CHART_FONT}}, y:{grid:{display:false},ticks:{font:CHART_FONT}} }
        : { y:{grid:{color:GRID_COLOR},ticks:{font:CHART_FONT}}, x:{grid:{display:false},ticks:{font:CHART_FONT}} }
    }
  };
}

function renderAnalyticsTab(tab){

    const gb = groupBy(cycles.filter(c=>c.issue!=='정상'), c=>c.issue);

      {type:'bar', label:'건수', data:order.map(([,v])=>v.length), backgroundColor:'rgba(226,87,76,.6)', borderRadius:4, yAxisID:'y'},

function renderHeatmap(cycles){
  const rows = CLEAN_EQUIP;
  const cols = heatmapMode==='micro'
    ? [...new Set(cycles.map(c=>c.process+' '+c.chamber))].sort()
    : MAKERS;
  const colFn = heatmapMode==='micro' ? (c=>c.process+' '+c.chamber) : (c=>c.maker);
  const area = document.getElementById('heatArea');
  let html = `<div class="heat-grid" style="grid-template-columns:90px repeat(${cols.length},1fr);">`;
  html += `<div></div>` + cols.map(c=>`<div class="heat-col-label">${c}</div>`).join('');
  rows.forEach(r=>{
    html += `<div class="heat-row-label">${r}</div>`;
    cols.forEach(c=>{
      const subset = cycles.filter(cy=>cy.equip===r && colFn(cy)===c);
      const rate = subset.length ? defectRate(subset) : null;
      const bg = rate===null ? '#1a2233' : heatColor(rate);
      html += `<div class="heat-cell" style="background:${bg};" title="${r} / ${c}: ${subset.length}건">${rate===null?'-':Math.round(rate*100)+'%'}</div>`;
    });
  });
  html += `</div>`;
  area.innerHTML = html;
}
function heatColor(rate){
  // green -> amber -> red scale
  const stops = [
    {t:0, c:[76,175,130]},
    {t:0.5, c:[226,160,63]},
    {t:1, c:[226,87,76]}
  ];
  let a=stops[0], b=stops[stops.length-1];
  for (let i=0;i<stops.length-1;i++){ if (rate>=stops[i].t && rate<=stops[i+1].t){ a=stops[i]; b=stops[i+1]; break; } }
  const span = (b.t-a.t)||1;
  const f = Math.min(1,Math.max(0,(rate-a.t)/span));
  const c = a.c.map((v,i)=>Math.round(v+(b.c[i]-v)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function saveNewRecord(){
  const val = id => document.getElementById(id).value;
  const snInput = val('nSn').trim();
  const kitInfo = PART_KITS.find(k=>k.name===val('nKit'));
  let serial = SERIALS.find(s=>s.sn===snInput);
  const inD = new Date(val('nInDate')), outD = new Date(val('nOutDate'));

  const cycle = {
    sn: snInput || `NEW-${Date.now().toString().slice(-6)}`,
    customer: val('nCustomer'), maker: val('nMaker'), process: val('nProcess'),
    gas: (GAS_BY_PROCESS[val('nProcess')]||['-'])[0], toolId: val('nTool')||'-', chamber: val('nChamber')||'-',
    kit: val('nKit'),
    inDate: fmtDate(inD), outDate: fmtDate(outD), inDateObj: inD, outDateObj: outD,
    factory: val('nFactory'), equip: val('nEquip'), operator: val('nOperator'),
    inspectorIn: val('nInspIn'), inspectorOut: val('nInspOut'),
    pmType: val('nPm'), issue: val('nIssue'), coated: kitInfo?kitInfo.coated:true,
    recoating: val('nRecoat')==='Y', cycleType: val('nCycleType'),
    usageHours: randInt(150,500), action: val('nAction') || '수기 등록 (조치내용 미입력)',
    isLast: true
  };

  if (!serial){
    serial = {
      sn: cycle.sn, kit: cycle.kit, coatedKit: cycle.coated, baseLife: kitInfo?kitInfo.baseLife:500,
      customer: cycle.customer, maker: cycle.maker, process: cycle.process, gas: cycle.gas,
      toolId: cycle.toolId, chamber: cycle.chamber, retired:false, retiredReason:null, cycles:[]
    };
    SERIALS.push(serial);
  }
  cycle.cycleNo = serial.cycles.length + 1;
  serial.cycles.forEach(c=>c.isLast=false);
  serial.cycles.push(cycle);
  ALL_CYCLES.push(cycle);
  ALL_CYCLES.sort((a,b)=>a.inDateObj-b.inDateObj);

  closeModal();
  selectedSN = serial.sn;
  refreshSnDatalist();
  switchView('lifecycle-dashboard');
}
